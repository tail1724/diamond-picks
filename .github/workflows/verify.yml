name: Verify

on:
  push:
    branches:
      - main
      - agent/consumer-ux-refactor
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: bun run typecheck 2>&1 | tee typecheck.log
      - name: Upload TypeScript diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
      - name: Stop on TypeScript errors
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - name: Build
        run: bun run build
